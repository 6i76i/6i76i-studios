<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cyber-Survival</title>
    <style>
        body {
            margin: 0;
            background-color: #080810;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            border-radius: 8px;
            overflow: hidden;
        }
        canvas {
            background: #0d0d1a;
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
            pointer-events: none;
        }
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 8, 16, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            display: none;
        }
        h1 {
            color: #ff0055;
            font-size: 42px;
            text-shadow: 0 0 20px #ff0055;
            margin-bottom: 10px;
        }
        p {
            color: #00ffcc;
            font-size: 18px;
            margin-bottom: 20px;
        }
        button {
            background: transparent;
            border: 2px solid #00ffcc;
            color: #00ffcc;
            padding: 10px 20px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
            transition: all 0.3s ease;
        }
        button:hover {
            background: #00ffcc;
            color: #0d0d1a;
            box-shadow: 0 0 20px #00ffcc;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="ui">Score: <span id="scoreVal">0</span></div>
    <div id="gameOverScreen">
        <h1 id="overTitle">GAME OVER</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">PLAY AGAIN</button>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('scoreVal');
    const finalScore = document.getElementById('finalScore');
    const gameOverScreen = document.getElementById('gameOverScreen');

    let player, bullets, enemies, particles, score, gameOver, mouse;

    class Player {
        constructor() {
            this.x = canvas.width / 2;
            this.y = canvas.height / 2;
            this.radius = 15;
            this.angle = 0;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            
            // Draw neon triangle ship
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.lineTo(-12, -12);
            ctx.lineTo(-6, 0);
            ctx.lineTo(-12, 12);
            ctx.closePath();
            
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffcc';
            ctx.stroke();
            ctx.restore();
        }
        update() {
            // Rotate player toward mouse
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            this.angle = Math.atan2(dy, dx);
        }
    }

    class Bullet {
        constructor(x, y, angle) {
            this.x = x;
            this.y = y;
            this.speed = 8;
            this.velocity = { x: Math.cos(angle) * this.speed, y: Math.sin(angle) * this.speed };
            this.radius = 3;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#ffff00';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffff00';
            ctx.fill();
        }
        update() {
            this.x += this.velocity.x;
            this.y += this.velocity.y;
        }
    }

    class Enemy {
        constructor() {
            this.radius = Math.random() * 15 + 10;
            // Spawn off-screen
            if (Math.random() < 0.5) {
                this.x = Math.random() < 0.5 ? 0 - this.radius : canvas.width + this.radius;
                this.y = Math.random() * canvas.height;
            } else {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() < 0.5 ? 0 - this.radius : canvas.height + this.radius;
            }
            this.speed = Math.random() * 1.5 + 1;
            this.color = `hsl(${Math.random() * 60 + 330}, 100%, 60%)`; // Pink/Red neon spectrum
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2;
            ctx.shadowBlur = 12;
            ctx.shadowColor = this.color;
            ctx.stroke();
        }
        update() {
            let dx = player.x - this.x;
            let dy = player.y - this.y;
            let angle = Math.atan2(dy, dx);
            this.x += Math.cos(angle) * this.speed;
            this.y += Math.sin(angle) * this.speed;
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.radius = Math.random() * 3;
            this.alpha = 1;
            this.velocity = {
                x: (Math.random() - 0.5) * 6,
                y: (Math.random() - 0.5) * 6
            };
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.restore();
        }
        update() {
            this.x += this.velocity.x;
            this.y += this.velocity.y;
            this.alpha -= 0.02;
        }
    }

    function init() {
        player = new Player();
        bullets = [];
        enemies = [];
        particles = [];
        score = 0;
        gameOver = false;
        mouse = { x: canvas.width / 2, y: canvas.height / 2 };
        scoreVal.innerText = score;
        gameOverScreen.style.display = 'none';
    }

    function spawnEnemies() {
        if (gameOver) return;
        enemies.push(new Enemy());
        // Ramp up difficulty based on score
        let nextSpawn = Math.max(400, 1500 - score * 10);
        setTimeout(spawnEnemies, nextSpawn);
    }

    function resetGame() {
        init();
        animate();
        spawnEnemies();
    }

    // Controls
    window.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
    });

    window.addEventListener('click', () => {
        if (gameOver) return;
        bullets.push(new Bullet(player.x, player.y, player.angle));
    });

    function animate() {
        if (gameOver) return;
        requestAnimationFrame(animate);
        
        // Motion blur effect
        ctx.fillStyle = 'rgba(13, 13, 26, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        player.update();
        player.draw();

        // Handle Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            if (particles[i].alpha <= 0) {
                particles.splice(i, 1);
            } else {
                particles[i].update();
                particles[i].draw();
            }
        }

        // Handle Bullets
        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].update();
            bullets[i].draw();

            // Remove out of bounds bullets
            if (bullets[i].x < 0 || bullets[i].x > canvas.width || bullets[i].y < 0 || bullets[i].y > canvas.height) {
                bullets.splice(i, 1);
            }
        }

        // Handle Enemies
        for (let i = enemies.length - 1; i >= 0; i--) {
            enemies[i].update();
            enemies[i].draw();

            // Check collision with player
            let distToPlayer = Math.hypot(player.x - enemies[i].x, player.y - enemies[i].y);
            if (distToPlayer - enemies[i].radius - player.radius < 0) {
                gameOver = true;
                finalScore.innerText = score;
                gameOverScreen.style.display = 'flex';
                // Big player explosion
                for (let p = 0; p < 40; p++) particles.push(new Particle(player.x, player.y, '#00ffcc'));
            }

            // Check collision with bullets
            for (let j = bullets.length - 1; j >= 0; j--) {
                let distToBullet = Math.hypot(bullets[j].x - enemies[i].x, bullets[j].y - enemies[i].y);
                
                // If bullet hits enemy
                if (distToBullet - enemies[i].radius - bullets[j].radius < 0) {
                    // Create explosion particles
                    for (let p = 0; p < 15; p++) {
                        particles.push(new Particle(enemies[i].x, enemies[i].y, enemies[i].color));
                    }

                    // Enemy Shrink or Kill
                    if (enemies[i].radius > 15) {
                        enemies[i].radius -= 8; // Shrink
                        score += 50;
                    } else {
                        enemies.splice(i, 1); // Destroy
                        score += 150;
                    }
                    bullets.splice(j, 1);
                    scoreVal.innerText = score;
                    break;
                }
            }
        }
    }

    // Start on load
    resetGame();
</script>
</body>
</html>
