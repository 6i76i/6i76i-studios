<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Mobile Jumper</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #05050a;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 500px; /* Looks great on mobile, constrained on desktop */
            max-height: 900px;
            background: #0a0a14;
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.2);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 25px;
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ff007f;
            pointer-events: none;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 10, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #ff007f;
            font-size: 36px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px #ff007f;
        }
        p {
            color: #00f0ff;
            font-size: 16px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #00f0ff;
        }
        .btn {
            background: transparent;
            border: 2px solid #00f0ff;
            color: #00f0ff;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="ui">
        <div id="score">0</div>
        <div id="highScore">HI: 0</div>
    </div>
    
    <div id="overlay">
        <h1 id="title">NEON JUMP</h1>
        <p id="subtitle">TAP ANYWHERE TO JUMP</p>
        <button class="btn" id="startBtn">START</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const title = document.getElementById('title');
    const subtitle = document.getElementById('subtitle');
    const scoreElement = document.getElementById('score');
    const highScoreElement = document.getElementById('highScore');

    let gameState = 'START'; // START, PLAYING, GAMEOVER
    let score = 0;
    let highScore = 0;
    let animationFrameId;

    // Mobile Scaler
    function resize() {
        const container = document.getElementById('gameContainer');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Game Objects
    let ball = {
        x: 0, y: 0, radius: 14,
        vy: 0, gravity: 0.45, jumpForce: -8.5
    };

    let platforms = [];
    let particles = [];
    const colors = ['#ff007f', '#00f0ff', '#00ff66', '#ffff00'];

    function initGame() {
        score = 0;
        scoreElement.innerText = score;
        
        ball.x = canvas.width * 0.25;
        ball.y = canvas.height * 0.4;
        ball.vy = 0;
        
        platforms = [];
        particles = [];
        
        // Spawn initial base platform under the player
        platforms.push({
            x: 0,
            y: canvas.height * 0.6,
            width: canvas.width,
            height: 20,
            color: '#00f0ff'
        });

        // Spawn a couple of forward platforms
        for(let i = 0; i < 4; i++) {
            generatePlatform();
        }
    }

    function generatePlatform() {
        let lastPlat = platforms[platforms.length - 1];
        let minX = lastPlat ? lastPlat.x + lastPlat.width + 60 : canvas.width * 0.5;
        let maxX = lastPlat ? lastPlat.x + lastPlat.width + 130 : canvas.width * 0.6;
        
        let width = Math.random() * 60 + 80; // platform width
        let height = 15;
        
        // Random height variation that is physically reachable
        let minY = lastPlat ? Math.max(canvas.height * 0.25, lastPlat.y - 100) : canvas.height * 0.5;
        let maxY = lastPlat ? Math.min(canvas.height * 0.8, lastPlat.y + 100) : canvas.height * 0.7;
        
        platforms.push({
            x: Math.random() * (maxX - minX) + minX,
            y: Math.random() * (maxY - minY) + minY,
            width: width,
            height: height,
            color: colors[Math.floor(Math.random() * colors.length)]
        });
    }

    function spawnExplosion(x, y, color) {
        for(let i = 0; i < 12; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                radius: Math.random() * 3 + 1,
                alpha: 1,
                color: color
            });
        }
    }

    // Controls (Both tap and click friendly)
    function handleTap(e) {
        if (gameState === 'PLAYING') {
            ball.vy = ball.jumpForce;
            spawnExplosion(ball.x, ball.y, '#ffffff');
        }
    }
    
    window.addEventListener('touchstart', (e) => {
        if(e.target !== startBtn) handleTap();
    });
    window.addEventListener('mousedown', (e) => {
        if(e.target !== startBtn) handleTap();
    });

    startBtn.addEventListener('click', () => {
        overlay.style.display = 'none';
        gameState = 'PLAYING';
        initGame();
        animate();
    });

    function gameOver() {
        gameState = 'GAMEOVER';
        if (score > highScore) {
            highScore = score;
            highScoreElement.innerText = "HI: " + highScore;
        }
        title.innerText = "CRASHED";
        title.style.color = "#ff007f";
        subtitle.innerText = "Score: " + score;
        startBtn.innerText = "TRY AGAIN";
        overlay.style.display = 'flex';
        cancelAnimationFrame(animationFrameId);
    }

    // Game Loop
    function animate() {
        if (gameState !== 'PLAYING') return;
        animationFrameId = requestAnimationFrame(animate);

        ctx.fillStyle = 'rgba(10, 10, 20, 0.4)'; // trails
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Apply Gravity to Player
        ball.vy += ball.gravity;
        ball.y += ball.vy;

        // Screen boundaries
        if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
            gameOver();
            return;
        }

        // Camera Tracking Speed (Game auto-scrolls horizontally)
        let speed = 3.5 + (score * 0.05); 
        
        // Move and draw platforms
        for (let i = platforms.length - 1; i >= 0; i--) {
            let p = platforms[i];
            p.x -= speed;

            // Neon glowing box
            ctx.shadowBlur = 15;
            ctx.shadowColor = p.color;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.width, p.height);
            ctx.shadowBlur = 0; // reset blur

            // Collision Detection (Landing on top of platforms)
            if (ball.x + ball.radius > p.x && 
                ball.x - ball.radius < p.x + p.width &&
                ball.y + ball.radius >= p.y && 
                ball.y - ball.radius < p.y + p.height &&
                ball.vy > 0) { // must be falling to land
                
                // Snap to top of platform and bounce slightly
                ball.y = p.y - ball.radius;
                ball.vy = ball.jumpForce * 0.85; // Auto-bounce up
                score += 10;
                scoreElement.innerText = score;
                spawnExplosion(ball.x, ball.y + ball.radius, p.color);
            }

            // Remove off-screen platforms
            if (p.x + p.width < 0) {
                platforms.splice(i, 1);
                generatePlatform();
            }
        }

        // Draw and update particles
        for(let i = particles.length - 1; i >= 0; i--) {
            let pt = particles[i];
            pt.x += pt.vx;
            pt.y += pt.vy;
            pt.alpha -= 0.03;
            
            if(pt.alpha <= 0) {
                particles.splice(i, 1);
            } else {
                ctx.save();
                ctx.globalAlpha = pt.alpha;
                ctx.fillStyle = pt.color;
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, pt.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Draw Player ball
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ffffff';
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
</script>
</body>
</html>
